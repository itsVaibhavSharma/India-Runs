  - "GitHub Copilot — autocomplete and boilerplate"

ai_usage_summary: |
  Used Claude for discussing system architecture, reviewing signal extraction
  logic, and debugging edge cases. Used GitHub Copilot for code autocomplete.
  No candidate data was passed to any external LLM or API.
  All core logic (7-signal extraction, behavioral gating, honeypot detection,
  trust-weighted scoring, fusion model design) was authored and validated by
  the team members. The ranking pipeline runs fully offline with no external
  API calls during inference.

# ============================================================================
# Approach summary (≤200 words)
# ============================================================================
methodology_summary: |
  Two-stage CPU-only ranker for the Senior AI Engineer role at Redrob AI.

  Stage 1 (Fast Filtering): Stream all 100K candidates, extract 7 independent
  signals per candidate: (1) title/career match with production+retrieval
  evidence, (2) trust-weighted skill depth (endorsements × duration ×
  proficiency × JD-relevance multiplier), (3) experience fit (5-9yr optimal),
  (4) education tier + field relevance, (5) location match, (6) behavioral
  availability gate (open_to_work + ≤60d active + response_rate>10%), and
  (7) honeypot penalty (timeline impossibility, skill inflation, company age
  mismatch, salary/experience mismatch). Gate removes inactive candidates
  early. Top 500 by semantic similarity (pre-computed all-MiniLM-L6-v2
  embeddings) advance.

  Stage 2 (Reranking): LogisticRegression + IsotonicRegression trained on
  synthetic JD-derived preference pairs fuses 7 signals + 4 interaction
  terms into a calibrated score. Combined 90/10 with semantic similarity.
  Honeypot penalty enforced as hard multiplier. Scores calibrated to [0,1]
  with monotonic enforcement. Template-based reasoning grounds all claims
  in verified candidate profile data (no hallucination).

